name: Paynix wallet top-up alert

# Fast, frequent check limited to the Paynix side (reseller dashboard +
# per-merchant wallet "Load Requests" logs) so new top-up requests get
# alerted on quickly, without re-running the slow full pipeline (18
# PixlerPay account logins + a 700+ row payout export) every 15 minutes.
# The full data refresh still happens separately every 30 min (refresh.yml).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: wallet-alert
  cancel-in-progress: true

jobs:
  wallet-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write credential files from secrets
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          PAYNIX_MERCHANT_LOGINS: ${{ secrets.PAYNIX_MERCHANT_LOGINS }}
          GDRIVE_OAUTH_CLIENT: ${{ secrets.GDRIVE_OAUTH_CLIENT }}
          GDRIVE_OAUTH_TOKEN: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          printf '%s' "$PAYNIX_MERCHANT_LOGINS" > data/paynix-merchant-logins.json
          printf '%s' "$GDRIVE_OAUTH_CLIENT" > data/gdrive-oauth-client.json
          printf '%s' "$GDRIVE_OAUTH_TOKEN" > data/gdrive-oauth-token.json

      - name: Scrape Paynix + alert on new wallet top-up requests
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAYNIX_HEADFUL: 'false'
        run: |
          npm run download-paynix
          npm run download-paynix-wallets
          npm run upload-to-drive
          npm run telegram-alert
